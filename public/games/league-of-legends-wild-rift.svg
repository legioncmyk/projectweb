<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-leagueoflegendswildrift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent-leagueoflegendswildrift" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-leagueoflegendswildrift" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-leagueoflegendswildrift" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-leagueoflegendswildrift" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 0L16 16M16 0L0 16" stroke="#1e40af" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#2563eb"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-leagueoflegendswildrift)"/>

    <!-- Decorative background shapes -->
    <polygon points="272.48780366869516,-84.5 272.48780366869516,-13.500000000000007 211,22 149.51219633130484,-13.500000000000007 149.51219633130484,-84.49999999999997 210.99999999999991,-120" fill="#93c5fd" opacity="0.11"/><rect x="176" y="-85" width="72" height="72" rx="4" fill="#93c5fd" opacity="0.11" transform="rotate(45 212 -49)"/><circle cx="213" cy="-49" r="73" fill="#93c5fd" opacity="0.11"/><polygon points="278.0858798800485,-86 278.0858798800485,-12.000000000000007 214,25 149.91412011995152,-12.000000000000007 149.91412011995152,-85.99999999999997 213.99999999999991,-123" fill="#93c5fd" opacity="0.11"/><rect x="177.5" y="-86.5" width="75" height="75" rx="4" fill="#93c5fd" opacity="0.11" transform="rotate(45 215 -49)"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-leagueoflegendswildrift)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-leagueoflegendswildrift)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-leagueoflegendswildrift)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-leagueoflegendswildrift)"
      transform="rotate(-6, 256, 240)">
      LOL
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      MOBA
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      League of Legends: Wild Rift
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>