<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-pubgmobile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="accent-pubgmobile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-pubgmobile" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fca5a5" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-pubgmobile" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-pubgmobile" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="none" stroke="#991b1b" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#dc2626"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-pubgmobile)"/>

    <!-- Decorative background shapes -->
    <rect x="167" y="188" width="54" height="54" rx="4" fill="#fca5a5" opacity="0.08" transform="rotate(45 194 215)"/><polygon points="238.89934640057527,188.5 238.89934640057527,241.5 193,268 147.10065359942473,241.5 147.10065359942473,188.5 192.99999999999994,162" fill="#fca5a5" opacity="0.08"/><circle cx="192" cy="215" r="52" fill="#fca5a5" opacity="0.08"/><rect x="165.5" y="189.5" width="51" height="51" rx="4" fill="#fca5a5" opacity="0.08" transform="rotate(45 191 215)"/><polygon points="233.30127018922195,190 233.30127018922195,240 190,265 146.69872981077805,240 146.69872981077805,190 189.99999999999994,165" fill="#fca5a5" opacity="0.08"/><circle cx="189" cy="215" r="49" fill="#fca5a5" opacity="0.08"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-pubgmobile)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-pubgmobile)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-pubgmobile)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="140"
      font-weight="800"
      fill="white"
      letter-spacing="8"
      filter="url(#textShadow-pubgmobile)"
      transform="rotate(-9, 256, 240)">
      PM
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      BATTLE ROYALE
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      PUBG Mobile
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>