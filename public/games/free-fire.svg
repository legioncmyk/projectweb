<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-freefire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="accent-freefire" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-freefire" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fca5a5" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-freefire" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-freefire" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#991b1b" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#dc2626"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-freefire)"/>

    <!-- Decorative background shapes -->
    <polygon points="194.35382907247958,111 194.35382907247958,183 132,219 69.64617092752042,183 69.6461709275204,111.00000000000003 131.99999999999991,75" fill="#fca5a5" opacity="0.09"/><circle cx="131" cy="147" r="71" fill="#fca5a5" opacity="0.09"/><rect x="95" y="112" width="70" height="70" rx="4" fill="#fca5a5" opacity="0.09" transform="rotate(45 130 147)"/><polygon points="188.75575286112627,112.5 188.75575286112627,181.5 129,216 69.24424713887373,181.5 69.24424713887373,112.50000000000003 128.99999999999991,78" fill="#fca5a5" opacity="0.09"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-freefire)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-freefire)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-freefire)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="140"
      font-weight="800"
      fill="white"
      letter-spacing="8"
      filter="url(#textShadow-freefire)"
      transform="rotate(17, 256, 240)">
      FF
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      BATTLE ROYALE
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Free Fire
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>