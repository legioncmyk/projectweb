<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-lineage2m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="accent-lineage2m" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-lineage2m" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-lineage2m" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-lineage2m" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#065f46" opacity="0.2"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#059669"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-lineage2m)"/>

    <!-- Decorative background shapes -->
    <polygon points="35.98076211353316,-4.999999999999998 35.98076211353316,25 10.000000000000002,40 -15.98076211353316,25 -15.980762113533164,-4.999999999999991 9.999999999999968,-20" fill="#6ee7b7" opacity="0.05"/><circle cx="9" cy="9" r="109" fill="#6ee7b7" opacity="0.05"/><rect x="-46" y="-45" width="108" height="108" rx="4" fill="#6ee7b7" opacity="0.05" transform="rotate(45 8 9)"/><polygon points="99.66471820493494,-44.49999999999999 99.66471820493494,62.49999999999999 7.000000000000006,116 -85.66471820493494,62.49999999999999 -85.66471820493496,-44.49999999999997 6.999999999999885,-98" fill="#6ee7b7" opacity="0.05"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-lineage2m)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-lineage2m)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-lineage2m)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="140"
      font-weight="800"
      fill="white"
      letter-spacing="8"
      filter="url(#textShadow-lineage2m)"
      transform="rotate(9, 256, 240)">
      L2
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      MMORPG
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Lineage 2M
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>