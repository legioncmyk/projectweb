<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-genshinimpact" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent-genshinimpact" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-genshinimpact" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d8b4fe" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-genshinimpact" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-genshinimpact" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="none" stroke="#6b21a8" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#9333ea"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-genshinimpact)"/>

    <!-- Decorative background shapes -->
    <polygon points="43.44486372867092,-24.999999999999996 43.44486372867092,8.999999999999996 14.000000000000002,26 -15.444863728670917,8.999999999999996 -15.44486372867092,-24.99999999999999 13.999999999999963,-42" fill="#d8b4fe" opacity="0.12000000000000001"/><rect x="-2.5" y="-25.5" width="35" height="35" rx="4" fill="#d8b4fe" opacity="0.12000000000000001" transform="rotate(45 15 -8)"/><circle cx="16" cy="-8" r="36" fill="#d8b4fe" opacity="0.12000000000000001"/><polygon points="49.04293994002423,-26.499999999999996 49.04293994002423,10.499999999999996 17.000000000000004,29 -15.042939940024233,10.499999999999996 -15.042939940024233,-26.49999999999999 16.99999999999996,-45" fill="#d8b4fe" opacity="0.12000000000000001"/><rect x="-1" y="-27" width="38" height="38" rx="4" fill="#d8b4fe" opacity="0.12000000000000001" transform="rotate(45 18 -8)"/><circle cx="19" cy="-8" r="39" fill="#d8b4fe" opacity="0.12000000000000001"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-genshinimpact)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-genshinimpact)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-genshinimpact)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="140"
      font-weight="800"
      fill="white"
      letter-spacing="8"
      filter="url(#textShadow-genshinimpact)"
      transform="rotate(7, 256, 240)">
      GI
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      RPG
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Genshin Impact
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>