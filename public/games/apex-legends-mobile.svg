<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-apexlegendsmobile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="accent-apexlegendsmobile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-apexlegendsmobile" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fca5a5" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-apexlegendsmobile" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-apexlegendsmobile" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 0L16 16M16 0L0 16" stroke="#991b1b" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#dc2626"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-apexlegendsmobile)"/>

    <!-- Decorative background shapes -->
    <polygon points="64.21023553303061,-46.99999999999999 64.21023553303061,40.99999999999999 -11.999999999999995,85 -88.21023553303061,40.99999999999999 -88.21023553303061,-46.99999999999998 -12.000000000000094,-91" fill="#fca5a5" opacity="0.1"/><circle cx="-13" cy="-3" r="87" fill="#fca5a5" opacity="0.1"/><rect x="-57" y="-46" width="86" height="86" rx="4" fill="#fca5a5" opacity="0.1" transform="rotate(45 -14 -3)"/><polygon points="58.6121593216773,-45.49999999999999 58.6121593216773,39.49999999999999 -14.999999999999995,82 -88.6121593216773,39.49999999999999 -88.6121593216773,-45.49999999999998 -15.00000000000009,-88" fill="#fca5a5" opacity="0.1"/><circle cx="-16" cy="-3" r="84" fill="#fca5a5" opacity="0.1"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-apexlegendsmobile)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-apexlegendsmobile)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-apexlegendsmobile)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-apexlegendsmobile)"
      transform="rotate(14, 256, 240)">
      ALM
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      BATTLE ROYALE
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Apex Legends Mobile
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>