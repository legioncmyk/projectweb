<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-ragnarokmeternallove" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="accent-ragnarokmeternallove" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-ragnarokmeternallove" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#6ee7b7" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6ee7b7" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-ragnarokmeternallove" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-ragnarokmeternallove" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="none" stroke="#065f46" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#059669"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-ragnarokmeternallove)"/>

    <!-- Decorative background shapes -->
    <polygon points="205.31088913245534,-154.5 205.31088913245534,-119.5 175,-102 144.68911086754466,-119.5 144.68911086754463,-154.5 174.99999999999997,-172" fill="#6ee7b7" opacity="0.1"/><rect x="158" y="-155" width="36" height="36" rx="4" fill="#6ee7b7" opacity="0.1" transform="rotate(45 176 -137)"/><circle cx="177" cy="-137" r="37" fill="#6ee7b7" opacity="0.1"/><polygon points="210.9089653438087,-156 210.9089653438087,-118 178,-99 145.0910346561913,-118 145.0910346561913,-156 177.99999999999997,-175" fill="#6ee7b7" opacity="0.1"/><rect x="159.5" y="-156.5" width="39" height="39" rx="4" fill="#6ee7b7" opacity="0.1" transform="rotate(45 179 -137)"/><circle cx="180" cy="-137" r="40" fill="#6ee7b7" opacity="0.1"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-ragnarokmeternallove)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-ragnarokmeternallove)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-ragnarokmeternallove)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-ragnarokmeternallove)"
      transform="rotate(3, 256, 240)">
      RME
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      MMORPG
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Ragnarok M: Eternal Love
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>