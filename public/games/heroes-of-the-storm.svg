<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-heroesofthestorm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="accent-heroesofthestorm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-heroesofthestorm" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-heroesofthestorm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-heroesofthestorm" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="none" stroke="#1e40af" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#2563eb"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-heroesofthestorm)"/>

    <!-- Decorative background shapes -->
    <circle cx="67" cy="-100" r="87" fill="#93c5fd" opacity="0.060000000000000005"/><rect x="23" y="-143" width="86" height="86" rx="4" fill="#93c5fd" opacity="0.060000000000000005" transform="rotate(45 66 -100)"/><polygon points="138.6121593216773,-142.5 138.6121593216773,-57.50000000000001 65,-15 -8.612159321677296,-57.50000000000001 -8.612159321677296,-142.49999999999997 64.99999999999991,-185" fill="#93c5fd" opacity="0.060000000000000005"/><circle cx="64" cy="-100" r="84" fill="#93c5fd" opacity="0.060000000000000005"/><rect x="21.5" y="-141.5" width="83" height="83" rx="4" fill="#93c5fd" opacity="0.060000000000000005" transform="rotate(45 63 -100)"/><polygon points="133.01408311032398,-141 133.01408311032398,-59.00000000000001 62.00000000000001,-18 -9.01408311032398,-59.00000000000001 -9.01408311032398,-140.99999999999997 61.999999999999915,-182" fill="#93c5fd" opacity="0.060000000000000005"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-heroesofthestorm)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-heroesofthestorm)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-heroesofthestorm)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-heroesofthestorm)"
      transform="rotate(15, 256, 240)">
      HOT
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      MOBA
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Heroes of the Storm
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>