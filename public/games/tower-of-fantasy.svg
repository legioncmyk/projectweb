<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-toweroffantasy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent-toweroffantasy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-toweroffantasy" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#d8b4fe" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d8b4fe" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-toweroffantasy" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-toweroffantasy" width="20" height="20" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="20" stroke="#6b21a8" stroke-width="1" opacity="0.15"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#9333ea"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-toweroffantasy)"/>

    <!-- Decorative background shapes -->
    <circle cx="190" cy="46" r="50" fill="#d8b4fe" opacity="0.11"/><rect x="164.5" y="21.5" width="49" height="49" rx="4" fill="#d8b4fe" opacity="0.11" transform="rotate(45 189 46)"/><polygon points="229.56921938165306,22.000000000000004 229.56921938165306,70 188,94 146.43078061834694,70 146.43078061834694,22.000000000000014 187.99999999999994,-2" fill="#d8b4fe" opacity="0.11"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-toweroffantasy)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-toweroffantasy)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-toweroffantasy)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-toweroffantasy)"
      transform="rotate(-12, 256, 240)">
      TOF
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      RPG
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Tower of Fantasy
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>