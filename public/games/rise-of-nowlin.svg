<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-riseofnowlin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="accent-riseofnowlin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-riseofnowlin" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#fcd34d" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fcd34d" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-riseofnowlin" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-riseofnowlin" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 0L16 16M16 0L0 16" stroke="#92400e" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#d97706"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-riseofnowlin)"/>

    <!-- Decorative background shapes -->
    <polygon points="1.0044641670905605,-111.5 1.0044641670905605,-14.500000000000007 -83,34 -167.00446416709056,-14.500000000000007 -167.00446416709056,-111.49999999999997 -83.0000000000001,-160" fill="#fcd34d" opacity="0.14"/><rect x="-131" y="-112" width="98" height="98" rx="4" fill="#fcd34d" opacity="0.14" transform="rotate(45 -82 -63)"/><circle cx="-81" cy="-63" r="99" fill="#fcd34d" opacity="0.14"/><polygon points="6.6025403784438765,-113 6.6025403784438765,-13.000000000000007 -80,37 -166.60254037844388,-13.000000000000007 -166.60254037844388,-112.99999999999997 -80.00000000000011,-163" fill="#fcd34d" opacity="0.14"/><rect x="-129.5" y="-113.5" width="101" height="101" rx="4" fill="#fcd34d" opacity="0.14" transform="rotate(45 -79 -63)"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-riseofnowlin)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-riseofnowlin)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-riseofnowlin)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-riseofnowlin)"
      transform="rotate(-18, 256, 240)">
      RON
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      STRATEGY
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Rise of Nowlin
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>