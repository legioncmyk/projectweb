<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-magicthegatheringarena" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="accent-magicthegatheringarena" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-magicthegatheringarena" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-magicthegatheringarena" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-magicthegatheringarena" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="none" stroke="#155e75" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#0891b2"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-magicthegatheringarena)"/>

    <!-- Decorative background shapes -->
    <rect x="-139" y="-149" width="82" height="82" rx="4" fill="#67e8f9" opacity="0.13" transform="rotate(45 -98 -108)"/><circle cx="-97" cy="-108" r="83" fill="#67e8f9" opacity="0.13"/><polygon points="-23.25386608210715,-150 -23.25386608210715,-66 -96,-24 -168.74613391789285,-66 -168.74613391789285,-149.99999999999997 -96.00000000000009,-192" fill="#67e8f9" opacity="0.13"/><rect x="-137.5" y="-150.5" width="85" height="85" rx="4" fill="#67e8f9" opacity="0.13" transform="rotate(45 -95 -108)"/><circle cx="-94" cy="-108" r="86" fill="#67e8f9" opacity="0.13"/><polygon points="-17.655789870753836,-151.5 -17.655789870753836,-64.5 -93,-21 -168.34421012924616,-64.5 -168.34421012924616,-151.49999999999997 -93.0000000000001,-195" fill="#67e8f9" opacity="0.13"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-magicthegatheringarena)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-magicthegatheringarena)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-magicthegatheringarena)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-magicthegatheringarena)"
      transform="rotate(-13, 256, 240)">
      MTG
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      CARD
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Magic: The Gathering Arena
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>