<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-deadbydaylightmobile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="accent-deadbydaylightmobile" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fda4af" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-deadbydaylightmobile" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#fda4af" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fda4af" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-deadbydaylightmobile" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-deadbydaylightmobile" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect width="32" height="32" fill="none" stroke="#9f1239" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#e11d48"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-deadbydaylightmobile)"/>

    <!-- Decorative background shapes -->
    <polygon points="4.736514974659428,123.5 4.736514974659428,222.5 -81,272 -166.73651497465943,222.5 -166.73651497465943,123.50000000000003 -81.0000000000001,74" fill="#fda4af" opacity="0.07"/><rect x="-130" y="123" width="100" height="100" rx="4" fill="#fda4af" opacity="0.07" transform="rotate(45 -80 173)"/><circle cx="-79" cy="173" r="101" fill="#fda4af" opacity="0.07"/><polygon points="10.334591186012744,122 10.334591186012744,224 -78,275 -166.33459118601274,224 -166.33459118601274,122.00000000000003 -78.00000000000011,71" fill="#fda4af" opacity="0.07"/><rect x="-128.5" y="121.5" width="103" height="103" rx="4" fill="#fda4af" opacity="0.07" transform="rotate(45 -77 173)"/><circle cx="-76" cy="173" r="104" fill="#fda4af" opacity="0.07"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-deadbydaylightmobile)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-deadbydaylightmobile)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-deadbydaylightmobile)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-deadbydaylightmobile)"
      transform="rotate(7, 256, 240)">
      DBD
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      ACTION
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Dead by Daylight Mobile
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>