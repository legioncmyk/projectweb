<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-valorant" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="accent-valorant" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <radialGradient id="glow-valorant" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#fca5a5" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#fca5a5" stop-opacity="0"/>
    </radialGradient>
    <filter id="textShadow-valorant" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.4)"/>
    </filter>
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="48" ry="48"/>
    </clipPath>
    <pattern id="pattern-valorant" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 0L16 16M16 0L0 16" stroke="#991b1b" stroke-width="0.5" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Base shape with rounded corners -->
  <rect width="512" height="512" rx="48" ry="48" fill="#dc2626"/>

  <g clip-path="url(#roundClip)">
    <!-- Main gradient background -->
    <rect width="512" height="512" fill="url(#bg-valorant)"/>

    <!-- Decorative background shapes -->
    <polygon points="279.9519052838329,197.5 279.9519052838329,272.5 215,310 150.0480947161671,272.5 150.0480947161671,197.50000000000003 214.99999999999991,160" fill="#fca5a5" opacity="0.07"/><rect x="178" y="197" width="76" height="76" rx="4" fill="#fca5a5" opacity="0.07" transform="rotate(45 216 235)"/><circle cx="217" cy="235" r="77" fill="#fca5a5" opacity="0.07"/><polygon points="285.5499814951862,196 285.5499814951862,274 218,313 150.45001850481378,274 150.45001850481378,196.00000000000003 217.99999999999991,157" fill="#fca5a5" opacity="0.07"/><rect x="179.5" y="195.5" width="79" height="79" rx="4" fill="#fca5a5" opacity="0.07" transform="rotate(45 219 235)"/>

    <!-- Large soft glow -->
    <ellipse cx="256" cy="220" rx="220" ry="180" fill="url(#glow-valorant)"/>

    <!-- Pattern overlay -->
    <rect width="512" height="512" fill="url(#pattern-valorant)"/>

    <!-- Secondary gradient accent strip -->
    <rect x="0" y="380" width="512" height="132" fill="url(#accent-valorant)" opacity="0.3"/>

    <!-- Subtle corner accent -->
    <circle cx="512" cy="0" r="160" fill="white" opacity="0.04"/>
    <circle cx="0" cy="512" r="120" fill="black" opacity="0.08"/>

    <!-- Main initials text -->
    <text x="256" y="240" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Display', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="110"
      font-weight="800"
      fill="white"
      letter-spacing="4"
      filter="url(#textShadow-valorant)"
      transform="rotate(-14, 256, 240)">
      VAL
    </text>

    <!-- Category label bar -->
    <rect x="140" y="380" width="232" height="36" rx="18" fill="black" opacity="0.3"/>
    <text x="256" y="398" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="13" font-weight="600"
      fill="white" opacity="0.9"
      letter-spacing="2">
      BATTLE ROYALE
    </text>

    <!-- Game name at bottom -->
    <text x="256" y="450" text-anchor="middle" dominant-baseline="central"
      font-family="'SF Pro Text', 'Inter', 'Segoe UI', Arial, sans-serif"
      font-size="16" font-weight="500"
      fill="white" opacity="0.8"
      letter-spacing="0.5">
      Valorant
    </text>

    <!-- Top highlight border -->
    <rect x="0" y="0" width="512" height="3" fill="white" opacity="0.2"/>
  </g>

  <!-- Outer border for polish -->
  <rect width="512" height="512" rx="48" ry="48" fill="none" stroke="white" stroke-width="1" opacity="0.1"/>
</svg>